{% extends "base.html" %} {% block body %}

<div class="container">
  <section class="w-100 px-4 py-5" style="border-radius: .5rem .5rem 0 0;">
    <div class="row d-flex justify-content-center">
      <div class="col col-md-9 col-lg-7 col-xl-6">
        <div class="card" style="border-radius: 15px;">
          <div class="card-body p-4">
            <div class="d-flex">
              <div class="flex-shrink-0">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-profiles/avatar-1.webp"
                  alt="Generic placeholder image" class="img-fluid" style="width: 180px; border-radius: 10px;">
              </div>
              <div class="flex-grow-1 ms-3">
                <h5 class="mb-1">{{ current_user.username }}</h5>
                <p class="mb-2 pb-1">{{ current_user.email }}</p>
                <div class="d-flex justify-content-between rounded-3 p-2 mb-2 bg-body-tertiary">
                  <div class="d-flex flex-column"> 
                    <p class="small text-muted mb-1">Coursos</p>
                    <p class="mb-0">0</p>
                  </div>
                  <div class="d-flex flex-column">
                    <p class="small text-muted mb-1 align-end">Posts</p>
                    <p class="mb-0">0</p>
                  </div>
                </div>
                <div class="d-flex pt-1">
                  <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-outline-primary me-1 flex-grow-1">Editar Perfil</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

{% endblock %}
